<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vrrrt - 100 visitors. 2 buyers?</title>
  <meta name="description" content="Vrrrt turns the first 30 seconds of a Shopify visit into rapid product discovery: 90 products visible, 540 in 3 minutes." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --ink: #070708;
      --panel: #111113;
      --panel-2: #161619;
      --line: #29292d;
      --text: #f6f4ef;
      --muted: #c9c3b8;
      --quiet: #8f897f;
      --green: #00e26a;
      --green-2: #39ff88;
      --red: #ff453a;
      --paper: #f6f4ef;
      --paper-2: #ebe7df;
    }

    html, body { margin: 0; padding: 0; background: var(--ink); }
    body {
      font-family: 'Geist', system-ui, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    *, *::before, *::after { box-sizing: border-box; }
    button, a { font-family: inherit; }
    .vt-btn { white-space: nowrap; }
    .vt-btn--primary:hover { background: #3CFA8B !important; box-shadow: 0 0 0 4px rgba(0,226,106,0.18), 0 0 24px rgba(0,226,106,0.45); }
    .vt-btn--secondary:hover { background: #27272A !important; }
    .vt-btn--tertiary:hover  { background: #FAFAFA !important; border-color: #D4D4D8 !important; }
    .vt-btn--ghost:hover     { background: #F4F4F5 !important; }
    .vt-btn--ghost-on-dark:hover { background: rgba(255,255,255,0.06) !important; border-color: rgba(255,255,255,0.3) !important; }
    .vt-btn:active { transform: scale(0.97); }

    .section {
      padding: 112px 32px;
    }

    .wrap {
      width: min(1440px, calc(100vw - 64px));
      margin: 0 auto;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 18px;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px rgba(0,226,106,0.8);
    }

    .hero {
      min-height: calc(100vh - 64px);
      padding: 62px 32px 58px;
      background:
        radial-gradient(circle at 74% 36%, rgba(0,226,106,0.13), transparent 26%),
        linear-gradient(180deg, #080809 0%, #050506 100%);
      overflow: hidden;
    }

    .hero .wrap {
      width: min(1968px, calc(100vw - 80px));
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(520px, 1fr);
      align-items: center;
      gap: 56px;
    }

    .hero h1 {
      margin: 28px 0 0;
      max-width: 900px;
      color: var(--text);
      font-size: clamp(52px, 4.1vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.065em;
      font-weight: 800;
    }

    .hero-sub {
      margin: 24px 0 0;
      color: var(--text);
      font-size: clamp(21px, 1.75vw, 27px);
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .hero-proof {
      margin: 20px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.48;
      font-weight: 600;
    }

    .green { color: var(--green); }
    .mobile-break { display: none; }

    .cta-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .engine-frame {
      display: block;
      position: relative;
      max-width: 860px;
      margin: 0 auto;
      border: 1px solid rgba(0,226,106,0.24);
      border-radius: 28px;
      padding: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 0 70px rgba(0,226,106,0.12);
      color: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 140ms cubic-bezier(.2,.9,.2,1), box-shadow 140ms cubic-bezier(.2,.9,.2,1), transform 140ms cubic-bezier(.2,.9,.2,1);
    }

    .engine-frame:hover {
      border-color: rgba(0,226,106,0.58);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 0 90px rgba(0,226,106,0.2);
      transform: translateY(-2px);
    }

    .engine-frame:focus-visible {
      outline: 3px solid rgba(0,226,106,0.75);
      outline-offset: 5px;
    }

    .engine-media {
      position: relative;
      width: 100%;
      margin-inline: auto;
      aspect-ratio: 4 / 3;
      max-height: min(58vh, 620px);
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .engine-media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .engine-media video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
    }

    .live-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 2;
      padding: 7px 11px;
      border-radius: 8px;
      background: var(--green);
      color: #020202;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .metric-chip {
      min-height: 98px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.035);
      padding: 14px 15px;
    }

    .metric-chip.speed-chip {
      border-color: rgba(0,226,106,0.48);
      background: rgba(0,226,106,0.08);
      box-shadow: inset 0 0 0 1px rgba(0,226,106,0.12), 0 0 32px rgba(0,226,106,0.08);
    }

    .metric-chip strong {
      display: block;
      color: var(--green);
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 19px;
      line-height: 1;
      margin-bottom: 10px;
    }

    .metric-chip span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.32;
      font-weight: 700;
    }

    .light {
      background: var(--paper);
      color: #070708;
    }

    .dark {
      background: var(--ink);
      color: var(--text);
    }

    .section h2 {
      margin: 0;
      max-width: 900px;
      font-size: clamp(50px, 6vw, 88px);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    .section-lead {
      margin: 28px 0 0;
      max-width: 820px;
      font-size: clamp(22px, 2.4vw, 34px);
      line-height: 1.18;
      letter-spacing: -0.03em;
      font-weight: 750;
    }

    .body-copy {
      margin: 22px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.55;
      font-weight: 600;
    }

    .kill-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(460px, 1.1fr);
      gap: 48px;
      align-items: center;
      margin-top: 42px;
    }

    .kill-section {
      padding-top: 86px;
      padding-bottom: 86px;
    }

    .kill-section h2 {
      max-width: 1120px;
      font-size: clamp(48px, 5.1vw, 76px);
      line-height: 0.98;
    }

    .kill-section .section-lead {
      margin-top: 0;
      font-size: clamp(27px, 2.45vw, 39px);
      line-height: 1.12;
      max-width: 660px;
    }

    .kill-section .body-copy {
      max-width: 680px;
      font-size: 21px;
      line-height: 1.48;
    }

    .comparison-card {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: #070708;
      padding: 30px;
      box-shadow: 0 20px 54px rgba(0,0,0,0.08);
    }

    .comparison-card.light-card {
      background: #fff;
      border-color: #ddd8cf;
      box-shadow: 0 18px 44px rgba(0,0,0,0.08);
    }

    .kill-outro {
      margin-top: 54px;
      padding-top: 30px;
      border-top: 1px solid #ddd8cf;
      max-width: 1100px;
    }

    .kill-outro .label {
      color: #070708;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 13px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .kill-outro p {
      margin: 16px 0 0;
      max-width: 980px;
      color: #070708;
      font-size: clamp(28px, 3.2vw, 46px);
      line-height: 1.04;
      letter-spacing: -0.05em;
      font-weight: 850;
    }

    .kill-proof-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 34px;
    }

    .kill-proof-card {
      border: 1px solid #ddd8cf;
      border-radius: 18px;
      background: rgba(255,255,255,0.68);
      padding: 22px;
      min-height: 196px;
    }

    .kill-proof-card .metric {
      color: var(--green);
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: clamp(34px, 3.4vw, 54px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 850;
      margin-bottom: 18px;
    }

    .kill-proof-card h3 {
      margin: 0;
      color: #070708;
      font-size: 22px;
      line-height: 1.08;
      letter-spacing: -0.035em;
      font-weight: 850;
    }

    .kill-proof-card p {
      margin: 12px 0 0;
      color: #403b34;
      font-size: 15px;
      line-height: 1.42;
      font-weight: 700;
    }

    .findings-section {
      background: var(--paper);
      color: #11131a;
      padding: 42px 32px 68px;
    }

    .findings-wrap {
      position: relative;
      width: min(1080px, calc(100vw - 64px));
      margin: 0 auto;
      padding-left: 58px;
    }

    .findings-wrap::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 999px;
      background: var(--green);
      opacity: 0.95;
    }

    .finding {
      position: relative;
      padding: 0 0 54px;
    }

    .finding:last-child { padding-bottom: 0; }

    .finding::before {
      content: "";
      position: absolute;
      left: -51px;
      top: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 6px var(--paper);
    }

    .finding-label {
      color: var(--green);
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 13px;
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .finding h2 {
      margin: 0;
      max-width: 920px;
      color: #11131a;
      font-size: clamp(28px, 2.35vw, 36px);
      line-height: 1.08;
      letter-spacing: -0.045em;
      font-weight: 850;
    }

    .finding-intro {
      margin: 12px 0 0;
      max-width: 720px;
      color: #303844;
      font-size: clamp(18px, 1.45vw, 22px);
      line-height: 1.22;
      letter-spacing: -0.035em;
      font-weight: 800;
    }

    .finding-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .finding-stat {
      min-height: 112px;
      border: 1px solid #d9dce2;
      border-radius: 6px;
      background: rgba(255,255,255,0.62);
      padding: 18px 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .finding-stat.hot {
      background: rgba(0,226,106,0.06);
      border-color: rgba(0,226,106,0.9);
    }

    .finding-stat strong {
      display: block;
      color: #11131a;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: clamp(28px, 3.1vw, 44px);
      line-height: 0.9;
      letter-spacing: -0.075em;
      font-weight: 850;
      margin-bottom: 10px;
    }

    .finding-stat .stat-title {
      color: #7e8490;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .finding-stat span {
      display: block;
      margin-top: 7px;
      color: #5f6875;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
    }

    .milestone-grid {
      margin-top: 28px;
    }

    .milestone-title {
      color: #8b919d;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .milestone-row {
      display: grid;
      grid-template-columns: 72px minmax(200px, 0.88fr) minmax(320px, 1fr);
      align-items: center;
      gap: 14px;
      margin: 13px 0;
    }

    .milestone-row b {
      text-align: right;
      color: #11131a;
      font-size: 16px;
      font-weight: 800;
    }

    .milestone-track {
      height: 10px;
      border-radius: 999px;
      background: #e9ebee;
      overflow: hidden;
    }

    .milestone-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
    }

    .milestone-fill.gray { background: #cbd0d7; }

    .milestone-row p {
      margin: 0;
      color: #303844;
      font-size: 15px;
      line-height: 1.32;
      font-weight: 800;
    }

    .sources {
      margin-top: 16px;
      color: #686f7b;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .quote-block {
      margin-top: 24px;
      border-left: 3px solid var(--green);
      padding: 3px 0 3px 18px;
      color: #252d38;
      font-size: clamp(17px, 1.25vw, 21px);
      line-height: 1.42;
      font-style: italic;
      font-weight: 500;
    }

    .quote-block cite {
      display: block;
      margin-top: 12px;
      color: #686f7b;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      font-style: normal;
      font-weight: 700;
      text-transform: uppercase;
    }

    .reasoning-box {
      margin-top: 22px;
      border-radius: 6px;
      background: #f0f2f5;
      padding: 20px;
      color: #28313d;
      font-size: 15px;
      line-height: 1.48;
      font-weight: 650;
    }

    .reasoning-box .reasoning-label {
      color: #8b919d;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .split-finding {
      display: grid;
      grid-template-columns: minmax(260px, 0.85fr) minmax(360px, 1.15fr);
      gap: 34px;
      margin-top: 28px;
      align-items: start;
    }

    .big-proof {
      margin-bottom: 28px;
    }

    .big-proof.secondary {
      margin-top: 18px;
      margin-bottom: 0;
    }

    .big-proof strong {
      display: block;
      color: var(--green);
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: clamp(46px, 5vw, 70px);
      line-height: 0.88;
      letter-spacing: -0.1em;
      font-weight: 850;
      margin-bottom: 14px;
    }

    .big-proof.secondary strong {
      font-size: clamp(30px, 3.2vw, 44px);
      letter-spacing: -0.08em;
    }

    .big-proof h3 {
      margin: 0;
      color: #11131a;
      font-size: 19px;
      line-height: 1.12;
      font-weight: 850;
      letter-spacing: -0.035em;
    }

    .big-proof p {
      margin: 10px 0 0;
      color: #8b919d;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .standard-stack {
      display: grid;
      gap: 16px;
    }

    .standard-item {
      border-bottom: 1px dashed #cfd4dc;
      padding-bottom: 16px;
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 14px;
      align-items: start;
    }

    .standard-icon {
      width: 46px;
      height: 46px;
      border-radius: 6px;
      border: 2px solid #e3e6eb;
      background: #f6f7f9;
    }

    .standard-icon.hot {
      border-color: var(--green);
      background: rgba(0,226,106,0.14);
    }

    .standard-item .kicker {
      color: #8b919d;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .standard-item strong {
      display: block;
      color: #11131a;
      font-size: 19px;
      line-height: 1.1;
      font-weight: 850;
    }

    .standard-item span {
      display: block;
      margin-top: 6px;
      color: #394351;
      font-size: 15px;
      line-height: 1.38;
      font-weight: 650;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      margin-top: 24px;
    }

    .category-card h3 {
      margin: 0 0 16px;
      color: #11131a;
      font-size: 22px;
      font-weight: 850;
      letter-spacing: -0.03em;
    }

    .data-row {
      margin: 16px 0;
    }

    .data-row .topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: #303844;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .data-row .topline strong {
      color: #11131a;
      font-weight: 850;
    }

    .data-track {
      height: 8px;
      border-radius: 999px;
      background: #eceef2;
      overflow: hidden;
    }

    .data-fill {
      display: block;
      height: 100%;
      background: var(--green);
    }

    .data-fill.gray { background: #cbd0d7; }
    .data-fill.neutral { background: #8f98a6; }
    .data-fill.red { background: var(--red); }

    .insight-box {
      margin-top: 16px;
      border-left: 3px solid var(--green);
      background: rgba(0,226,106,0.07);
      padding: 15px 16px;
      color: #28313d;
      font-size: 15px;
      line-height: 1.48;
      font-weight: 650;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: minmax(280px, 0.78fr) minmax(360px, 1.22fr);
      gap: 32px;
      margin-top: 24px;
      align-items: start;
    }

    .choice-copy {
      display: grid;
      gap: 18px;
    }

    .choice-copy strong {
      display: block;
      color: #11131a;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: clamp(34px, 3.7vw, 52px);
      line-height: 0.9;
      letter-spacing: -0.08em;
      font-weight: 850;
      margin-bottom: 10px;
    }

    .choice-copy h3 {
      margin: 0;
      color: #11131a;
      font-size: 19px;
      line-height: 1.25;
      font-weight: 850;
    }

    .choice-copy p {
      margin: 12px 0 0;
      color: #394351;
      font-size: 15px;
      line-height: 1.5;
      font-weight: 650;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .mode-card {
      border: 1px solid #d9dce2;
      border-radius: 6px;
      background: rgba(255,255,255,0.7);
      padding: 18px;
      color: #303844;
      font-size: 15px;
      line-height: 1.52;
      font-weight: 650;
    }

    .mode-card.hot {
      background: rgba(0,226,106,0.06);
      border-color: var(--green);
    }

    .mode-card h3 {
      margin: 0 0 14px;
      color: #11131a;
      font-size: 18px;
      font-weight: 850;
    }

    .bar-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 22px;
      margin-bottom: 26px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
