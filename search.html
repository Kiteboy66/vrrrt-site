<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vrrrt for Google Search — Browse 540 products without leaving your search.</title>
  <meta name="description" content="The Vrrrt Chrome extension turns any product search into a 3-minute trawl of 540 products. Live now in the Chrome Web Store." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; padding: 0; }
    html, body { background: #0A0A0B; }
    body { font-family: 'Geist', system-ui, sans-serif; color: #0A0A0B; -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; }
    button, a { font-family: inherit; }
    .vt-btn { white-space: nowrap; }
    .vt-btn--primary:hover { background: #3CFA8B !important; box-shadow: 0 0 0 4px rgba(0,226,106,0.18), 0 0 24px rgba(0,226,106,0.45); }
    .vt-btn--ghost:hover { background: #F4F4F5 !important; }
    .vt-btn--ghost-on-dark:hover { background: rgba(255,255,255,0.06) !important; border-color: rgba(255,255,255,0.3) !important; }
    .vt-btn--tertiary:hover { background: #FAFAFA !important; border-color: #D4D4D8 !important; }
    .vt-btn:active { transform: scale(0.97); }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }
    @keyframes spin { to { transform: rotate(360deg) } }
  </style>
</head>
<body>
  <div id="root" data-screen-label="Vrrrt for Search"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="shared.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Hero = () => (
      <section style={{ background: '#0A0A0B', color: '#fff', padding: '120px 32px 96px', position: 'relative', overflow: 'hidden' }}>
        <div style={{
          position: 'absolute', inset: 0, opacity: 0.06,
          backgroundImage: 'repeating-linear-gradient(90deg, transparent 0 80px, #fff 80px 81px)',
          maskImage: 'linear-gradient(90deg, transparent, #000 30%, #000 70%, transparent)',
        }} />
        <div style={{ maxWidth: 1240, margin: '0 auto', position: 'relative' }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, marginBottom: 24, padding: '4px 10px 4px 4px', borderRadius: 999, background: '#18181B', border: '1px solid #27272A' }}>
            <span style={{ width: 22, height: 22, borderRadius: 999, background: '#0A0A0B', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="chrome" size={12} stroke={1.8} color="#00E26A" />
            </span>
            <span style={{ fontFamily: 'Geist, system-ui, sans-serif', fontSize: 12, fontWeight: 500, color: '#fff', whiteSpace: 'nowrap' }}>Vrrrt for Google Search</span>
            <StatusPill status="live" />
          </div>
          <h1 style={{ fontFamily: 'Geist, system-ui, sans-serif', fontWeight: 700, fontSize: 88, letterSpacing: '-0.05em', lineHeight: 0.95, margin: 0, maxWidth: '17ch' }}>
            They searched.<br/>
            They saw <span style={{ color: '#00E26A' }}>540.</span><br/>
            They never left.
          </h1>
          <p style={{ fontFamily: 'Geist, system-ui, sans-serif', fontSize: 19, color: '#A1A1AA', maxWidth: '56ch', marginTop: 28, lineHeight: 1.5 }}>
            The Vrrrt Chrome extension turns every product search into a 3-minute trawl. Shoppers see 540 products across the web — without clicking through ten storefronts. Your products show up where they're already looking.
          </p>
          <div style={{ display: 'flex', gap: 12, marginTop: 36, alignItems: 'center', flexWrap: 'wrap' }}>
            <Button variant="primary" size="lg" leadingIcon={<Icon name="chrome" size={16} stroke={1.8}/>} trailingIcon={<Icon name="arrow-right" size={16} stroke={2}/>}>
              Add to Chrome — free
            </Button>
            <Button variant="ghost-on-dark" size="lg">For merchants</Button>
          </div>
          <div style={{ marginTop: 18, fontFamily: 'Geist Mono, monospace', fontSize: 12, color: '#71717A' }}>
            4.8 · 12,400+ reviews · Chrome, Edge, Brave
          </div>
        </div>
      </section>
    );

    // Mock browser frame with Google SERP + Vrrrt overlay
    const SearchDemo = () => {
      const [active, setActive] = useState(2);
      const products = [
        ['#0A0A0B'], ['#27272A'], ['#71717A'], ['#A1A1AA'], ['#D4D4D8'], ['#FAFAFA'],
        ['#0A0A0B'], ['#27272A'], ['#71717A'], ['#A1A1AA'], ['#D4D4D8'], ['#FAFAFA'],
        ['#0A0A0B'], ['#27272A'], ['#71717A'], ['#A1A1AA'], ['#D4D4D8'], ['#FAFAFA'],
      ];
      return (
        <section style={{ background: '#FAFAFA', padding: '128px 32px' }}>
          <div style={{ maxWidth: 1240, margin: '0 auto' }}>
            <Eyebrow>— The overlay</Eyebrow>
            <h2 style={{ fontFamily: 'Geist, system-ui, sans-serif', fontWeight: 700, fontSize: 48, lineHeight: 1.02, letterSpacing: '-0.04em', margin: 0, color: '#0A0A0B', maxWidth: '22ch' }}>
              Search "wool coat." <span style={{ color: '#71717A' }}>See 540, not 8.</span>
            </h2>
            <p style={{ fontFamily: 'Geist, system-ui, sans-serif', fontSize: 16, color: '#71717A', maxWidth: '56ch', marginTop: 14, lineHeight: 1.5 }}>
              The Vrrrt overlay appears at the top of Google's shopping results, pulling the long tail of merchants the algorithm buried below the fold.
            </p>

            <div style={{ marginTop: 56, background: '#fff', borderRadius: 20, padding: 18, boxShadow: '0 24px 64px rgba(0,0,0,0.10), 0 0 0 1px rgba(0,0,0,0.05)' }}>
              {/* Browser chrome */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '4px 4px 14px', borderBottom: '1px solid #E4E4E7' }}>
                <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#FF3B30' }} />
                <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#F5B400' }} />
                <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#00C25A' }} />
                <div style={{ flex: 1, marginLeft: 14, background: '#FAFAFA', border: '1px solid #E4E4E7', borderRadius: 8, padding: '6px 14px', fontFamily: 'Geist Mono, monospace', fontSize: 12, color: '#71717A' }}>
                  google.com/search?q=wool+coat
                </div>
                <div style={{ marginLeft: 8, padding: '4px 10px', borderRadius: 6, background: '#0A0A0B', color: '#00E26A', fontFamily: 'Geist Mono, monospace', fontSize: 11, display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#00E26A', boxShadow: '0 0 6px rgba(0,226,106,0.7)' }}/>
                  Vrrrt
                </div>
              </div>
              {/* Vrrrt overlay strip */}
              <div style={{ marginTop: 18, background: '#0A0A0B', borderRadius: 14, padding: '18px 20px', color: '#fff' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span style={{ fontFamily: 'Geist, system-ui, sans-serif', fontWeight: 700, letterSpacing: '-0.04em', fontSize: 18 }}>Vrrrt<span style={{ color: '#00E26A' }}>.</span></span>
                    <span style={{ fontFamily: 'Geist Mono, monospace', fontSize: 11, color: '#A1A1AA' }}>540 results for "wool coat" · 14 stores</span>
                  </div>
                  <span style={{ fontFamily: 'Geist Mono, monospace', fontSize: 11, color: '#71717A' }}>0:47 / 3:00</span>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(18, 1fr)', gap: 6 }}>
                  {products.concat(products).map(([c], i) => (
                    <div key={i} onClick={() => setActive(i)} style={{
                      aspectRatio: '1/1', borderRadius: 4, background: c, cursor: 'pointer',
                      outline: i === active ? '2px solid #00E26A' : 'none',
                      outlineOffset: i === active ? 2 : 0,
                      boxShadow: i === active ? '0 0 18px rgba(0,226,106,0.6)' : 'none',
                      transition: 'all 120ms cubic-bezier(.2,.9,.2,1)',
                    }}/>
                  ))}
                </div>
              </div>
              {/* Mock Google results below */}
              <div style={{ marginTop: 18, padding: '8px 10px' }}>
                {['Patagonia · Wool Insulated Coat — $349', 'Everlane · ReWool Cocoon — $228', 'L.L. Bean · Stowaway Coat — $189'].map(s => (
                  <div key={s} style={{ padding: '8px 0', borderBottom: '1px solid #F4F4F5', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                    <div>
                      <div style={{ fontFamily: 'Geist, system-ui, sans-serif', fontSize: 13, color: '#1A0DAB' }}>{s}</div>
                      <div style={{ fontFamily: 'Geist Mono, monospace', fontSize: 10, color: '#71717A', marginTop: 2 }}>www.{s.split(' ')[0].toLowerCase()}.com › products › wool-coat</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    };

    // For merchants
    const ForMerchants = () => (
      <section style={{ background: '#fff', padding: '128px 32px', borderTop: '1px solid #E4E4E7' }}>
        <div style={{ maxWidth: 1240, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 64, alignItems: 'center' }}>
          <div>
            <Eyebrow>— For merchants</Eyebrow>
            <h2 style={{ fontFamily: 'Geist, system-ui, sans-serif', fontWeight: 700, fontSize: 48, lineHeight: 1.02, letterSpacing: '-0.04em', margin: 0, color: '#0A0A0B' }}>
              Show up where they're <span style={{ color: '#00E26A' }}>already looking.</span>
            </h2>
            <p style={{ fontFamily: 'Geist, system-ui, sans-serif', fontSize: 16, color: '#71717A', maxWidth: '48ch', marginTop: 18, lineHeight: 1.5 }}>
              Google Shopping shows 8 results. Vrrrt surfaces the next 532. If you're a small or mid-size merchant getting buried under the ad slots, this is the slot you want.
            </p>
            <p style={{ fontFamily: 'Geist, system-ui, sans-serif', fontSize: 16, color: '#71717A', maxWidth: '48ch', marginTop: 14, lineHeight: 1.5 }}>
              Already a Vrrrt for Shopify merchant? Your catalog is already indexed. Nothing to do.
            </p>
            <div style={{ display: 'flex', gap: 12, marginTop: 28, flexWrap: 'wrap' }}>
              <Button variant="primary" size="lg" trailingIcon={<Icon name="arrow-right" size={16} stroke={2}/>}>Install on Shopify</Button>
              <Button variant="tertiary" size="lg" href="#">Submit catalog</Button>
            </div>
          </div>
          <div style={{
            background: '#0A0A0B', color: '#fff', borderRadius: 20, padding: '40px',
            display: 'flex', flexDirection: 'column', gap: 28,
          }}>
            {[
              { v: '14 stores', l: 'avg. merchants per Vrrrt-overlaid search' },
              { v: '8 → 540',   l: 'Google\'s organic results → Vrrrt\'s long tail' },
              { v: 'Free',      l: 'Vrrrt merchants pay nothing extra for search reach' },
            ].map((m, i) => (
              <div key={i} style={{ paddingBottom: i < 2 ? 28 : 0, borderBottom: i < 2 ? '1px solid #18181B' : 'none' }}>
                <div style={{ fontFamily: 'Geist Mono, monospace', fontSize: 40, color: '#00E26A', fontWeight: 500, letterSpacing: '-0.02em', lineHeight: 1 }}>{m.v}</div>
                <div style={{ fontSize: 14, color: '#A1A1AA', marginTop: 8 }}>{m.l}</div>
              </div>
            ))}
          </div>
        </div>
      </section>
    );

    const App = () => (
      <>
        <Header active="search" dark />
        <Hero />
        <SearchDemo />
        <ForMerchants />
        <FooterCTA
          headline={'They searched.<br/><span style="color:#00E26A">They saw yours.</span>'}
          sub="Get your products into the Vrrrt overlay. Free for every Shopify merchant — and for shoppers, a one-click Chrome install."
          primary="Install on Shopify"
          secondary="Add to Chrome"
        />
        <Footer />
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
