<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vrrrt Tracker — See where shoppers leave your Shopify store.</title>
  <meta name="description" content="See your real Shopify storefront drop-off, page by page. Vrrrt shows where shoppers land, how fast they leave, and what they do next." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --ink: #070708;
      --panel: #111113;
      --panel-2: #161619;
      --line: #29292d;
      --text: #f6f4ef;
      --muted: #c9c3b8;
      --quiet: #8f897f;
      --green: #00e26a;
      --green-2: #39ff88;
      --red: #ff453a;
      --paper: #f6f4ef;
      --paper-2: #ebe7df;
    }
    html, body { margin: 0; padding: 0; background: var(--vt-ink); overflow-x: hidden; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body { font-family: var(--vt-font-sans); color: var(--vt-white); -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; }
    button, a { font-family: inherit; }
    .vt-btn { min-height: 44px; justify-content: center; text-align: center; }
    .vt-btn--primary:hover { background: #3CFA8B !important; box-shadow: 0 0 0 4px rgba(0,226,106,0.18), 0 0 24px rgba(0,226,106,0.45); }
    .vt-btn:active { transform: scale(0.97); }
    .tracker-root .vt-eyebrow,
    .tracker-root [style*="text-transform: uppercase"] {
      font-size: 13px !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase;
    }

    .tracker-root {
      min-height: 100vh;
      background: var(--ink);
      color: var(--text);
    }
    .tracker-section {
      padding: 0 32px;
      background: var(--paper);
      color: #11131a;
      border-top: 0;
    }
    .tracker-section:nth-of-type(odd):not(.tracker-hero) { background: var(--paper); }
    .tracker-section:first-child { border-top: 0; }
    .tracker-wrap {
      width: min(1080px, calc(100vw - 64px));
      margin: 0 auto;
      position: relative;
    }
    .tracker-section:not(.tracker-hero) .tracker-wrap {
      padding: 54px 0 54px 58px;
    }
    .tracker-section:not(.tracker-hero) .tracker-wrap::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 999px;
      background: var(--green);
      opacity: 0.95;
    }
    .tracker-section:not(.tracker-hero) .tracker-heading::before {
      content: "";
      position: absolute;
      left: -51px;
      top: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 6px var(--paper);
    }
    .tracker-narrow {
      max-width: 1040px;
    }
    .tracker-hero {
      min-height: auto;
      display: flex;
      align-items: center;
      padding: 62px 32px 58px;
      background:
        radial-gradient(circle at 74% 36%, rgba(0,226,106,0.13), transparent 26%),
        linear-gradient(180deg, #080809 0%, #050506 100%);
      color: var(--text);
    }
    .tracker-hero .tracker-wrap {
      width: min(1180px, calc(100vw - 80px));
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .tracker-hero h1 {
      margin: 0;
      max-width: 1120px;
      color: var(--text);
      font-size: clamp(52px, 4.1vw, 76px);
      line-height: 0.95;
      letter-spacing: -0.065em;
      font-weight: 800;
    }
    .tracker-copy {
      display: grid;
      gap: 24px;
      margin-top: var(--vt-s-6);
    }
    .tracker-copy p {
      margin: 0;
    }
    .tracker-copy strong {
      color: inherit;
      font-weight: 600;
    }
    .tracker-lead {
      max-width: 820px;
      color: var(--text);
      font-size: clamp(21px, 1.75vw, 27px);
      line-height: 1.18;
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    .tracker-body {
      max-width: 1040px;
      color: #303844;
      font-size: clamp(18px, 1.45vw, 22px);
      line-height: 1.36;
      letter-spacing: -0.025em;
      font-weight: 750;
    }
    .tracker-heading {
      position: relative;
      margin: 0;
      max-width: 1040px;
      color: #11131a;
      font-size: clamp(28px, 2.35vw, 36px);
      line-height: 1.08;
      letter-spacing: -0.045em;
      font-weight: 850;
    }
    .tracker-section-intro {
      max-width: 1040px;
      margin: 0 0 24px;
      color: #303844;
      font-size: clamp(18px, 1.45vw, 22px);
      line-height: 1.36;
      letter-spacing: -0.025em;
      font-weight: 750;
    }
    .tracker-cta {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-top: var(--vt-s-7);
    }
    .tracker-hero .tracker-cta {
      align-items: center;
    }
    .tracker-microcopy {
      margin: 0;
      color: var(--muted);
      font-size: var(--vt-text-xs);
    }
    .tracker-section .tracker-microcopy { color: #303844; }
    .tracker-card {
      margin: var(--vt-s-7) 0;
      padding: 20px;
      border: 1px solid #d9dce2;
      border-radius: 6px;
      background: rgba(255,255,255,0.62);
      box-shadow: none;
    }
    .tracker-visual {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid #d9dce2;
      border-radius: 6px;
      background: rgba(255,255,255,0.7);
    }
    .tracker-visual img,
    .tracker-visual video {
      display: block;
      width: 100%;
      height: auto;
    }
    .tracker-shot {
      min-height: 400px;
      object-fit: cover;
      object-position: top left;
      background: linear-gradient(135deg, #fff, #f0f2f5);
    }
    .tracker-tag {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      padding: 6px 9px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 6px;
      background: rgba(255,255,255,0.94);
      color: #11131a;
      font-family: var(--vt-font-mono);
      font-size: 11px;
      line-height: 1.2;
    }
    .tracker-caption {
      margin: 14px 0 0;
      color: #303844;
    }
    .tracker-pull {
      margin: var(--vt-s-8) 0 0;
      padding-left: var(--vt-s-5);
      border-left: 3px solid var(--green);
      max-width: 1040px;
      font-size: clamp(20px, 2.5vw, 26px);
      line-height: 1.25;
      letter-spacing: 0;
      color: #252d38;
      font-weight: 850;
    }
    .tracker-honesty,
    .tracker-aside {
      margin-top: var(--vt-s-7);
      padding: clamp(18px, 3vw, 26px);
      border: 0;
      border-left: 3px solid var(--green);
      border-radius: 6px;
      background: rgba(0,226,106,0.07);
      color: #28313d;
      font-size: 15px;
      line-height: 1.48;
      font-weight: 650;
    }
    .tracker-break {
      width: min(1040px, 100%);
      height: 1px;
      margin: var(--vt-s-7) 0;
      background: #d9dce2;
    }
    .tracker-list {
      display: grid;
      gap: 16px;
      margin: var(--vt-s-6) 0 0;
      padding: 0;
      list-style: none;
      max-width: 1040px;
      font-size: 17px;
      line-height: 1.6;
    }
    .tracker-list li {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 14px;
      color: var(--ink);
    }
    .tracker-list span {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(0,226,106,0.08);
      color: #11131a;
      border: 1px solid rgba(0,226,106,0.25);
      font-family: var(--vt-font-mono);
      font-size: 12px;
      font-weight: 600;
    }
    .tracker-bullets {
      display: grid;
      gap: 16px;
      margin: var(--vt-s-6) 0 0;
      padding-left: 1.2em;
      color: #303844;
    }
    .tracker-bullets li {
      padding-left: 4px;
    }
    .tracker-before-after {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 20px;
      align-items: stretch;
      margin-top: var(--vt-s-7);
    }
    .tracker-cube {
      height: 100%;
      min-height: 400px;
      display: flex;
      align-items: center;
      background: #fff;
    }
    .tracker-founder {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 32px;
      align-items: start;
    }
    .tracker-founder-photo {
      aspect-ratio: 1;
      border: 1px solid #d9dce2;
      border-radius: 6px;
      background: #ffffff;
      display: block;
      width: 100%;
      object-fit: cover;
    }
    .tracker-dev {
      background: rgba(0,226,106,0.06);
      border-top: 1px solid rgba(0,226,106,0.20);
      border-bottom: 1px solid rgba(0,226,106,0.20);
    }
    .tracker-pricing-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      margin-top: var(--vt-s-7);
      max-width: 1040px;
    }
    .tracker-price-card {
      display: flex;
      flex-direction: column;
      min-height: 390px;
      padding: 24px;
      border: 1px solid #d9dce2;
      border-radius: 6px;
      background: rgba(255,255,255,0.62);
      color: #11131a;
    }
    .tracker-price-card--featured {
      border-color: rgba(0,226,106,0.46);
      background: rgba(0,226,106,0.07);
    }
    .tracker-price-card h3 {
      margin: 0 0 18px;
      color: #11131a;
      font-size: 22px;
      font-weight: 850;
      letter-spacing: -0.035em;
    }
    .tracker-price {
      color: #11131a;
      font-family: var(--vt-font-mono);
      font-size: clamp(42px, 4vw, 58px);
      line-height: 1;
      letter-spacing: -0.05em;
      font-weight: 850;
    }
    .tracker-price span {
      color: #303844;
      font-family: var(--vt-font-sans);
      font-size: 15px;
      letter-spacing: 0;
      font-weight: 650;
    }
    .tracker-yearly {
      margin: 10px 0 28px;
      color: var(--green);
      font-size: 15px;
      font-weight: 750;
    }
    .tracker-price-card ul {
      display: grid;
      gap: 12px;
      margin: 0 0 28px;
      padding: 0;
      list-style: none;
      color: #303844;
      font-size: 15px;
      line-height: 1.35;
      font-weight: 650;
    }
    .tracker-price-card li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
    }
    .tracker-price-card li::before {
      content: "✓";
      color: var(--green);
      font-weight: 900;
    }
    .tracker-price-card .tracker-spacer {
      flex: 1;
    }
    .tracker-final {
      text-align: left;
      padding-bottom: 80px;
    }

    @media (max-width: 760px) {
      .tracker-section { padding: 0 16px; }
      .tracker-section:not(.tracker-hero) .tracker-wrap {
        width: min(100vw - 32px, 720px);
        padding: 42px 0 46px 34px;
      }
      .tracker-section:not(.tracker-hero) .tracker-wrap::before { left: 6px; }
      .tracker-section:not(.tracker-hero) .tracker-heading::before { left: -35px; }
      .tracker-hero { min-height: auto; padding: 72px 16px 52px; }
      .tracker-hero .tracker-wrap {
        width: min(100vw - 32px, 720px);
      }
      .tracker-hero h1 {
        font-size: clamp(39px, 12.2vw, 47px);
        letter-spacing: -0.065em;
        max-width: 100%;
      }
      .tracker-lead {
        font-size: clamp(18px, 4.5vw, 23px);
      }
      .tracker-heading {
        font-size: clamp(28px, 7vw, 40px);
      }
      .tracker-cta .vt-btn {
        width: 100%;
        max-width: 100%;
        min-height: 54px;
        padding-left: 18px !important;
        padding-right: 18px !important;
        line-height: 1.15 !important;
        white-space: normal !important;
      }
      .tracker-before-after,
      .tracker-founder,
      .tracker-pricing-grid {
        grid-template-columns: 1fr;
      }
      .tracker-shot {
        min-height: 0;
        object-fit: contain;
        background: #fff;
      }
      .tracker-visual,
      .tracker-cube {
        min-height: 0;
      }
      .tracker-visual {
        align-items: flex-start;
      }
      .tracker-tag {
        max-width: calc(100% - 24px);
        font-size: 10px;
      }
      .tracker-card { margin-left: 0; margin-right: 0; }
    }
    .tracker-root .vt-small,
    .tracker-root .tracker-section .vt-small {
      color: var(--ink) !important;
    }
    .tracker-root .tracker-section .tracker-tag,
    .tracker-root .tracker-section .label-caps {
      color: var(--ink) !important;
    }
    .tracker-root footer,
    .tracker-root footer p,
    .tracker-root footer a,
    .tracker-root footer span,
    .tracker-root footer div {
      color: #F4F4F5 !important;
    }
  </style>
</head>
<body>
  <div id="root" class="vt-root tracker-root" data-theme="dark" data-screen-label="Vrrrt Tracker"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="shared.jsx"></script>

  <script type="text/babel">
    const CTA_HREF = 'https://apps.shopify.com/3dnavigate';
    const CTA_TEXT = "Show me what's happening on my store";
    const CTA_MICROCOPY = 'Free for 14 days, then from $29/mo · cancel anytime';

    const CTA = ({ microcopy = CTA_MICROCOPY }) => (
      <div className="tracker-cta">
        <Button
          variant="primary"
          size="lg"
          href={CTA_HREF}
          trailingIcon={<Icon name="arrow-right" size={16} stroke={2}/>}
          style={{ maxWidth: '100%', whiteSpace: 'normal', lineHeight: 1.15 }}
        >
          {CTA_TEXT}
        </Button>
        <p className="tracker-microcopy">{microcopy}</p>
        <p className="tracker-microcopy">Loads in under two seconds. Installs in minutes, removes just as fast.</p>
      </div>
    );

    const Section = ({ children, className = '', id }) => (
      <section id={id} className={`tracker-section ${className}`}>
        <div className="tracker-wrap">{children}</div>
      </section>
    );

    const Copy = ({ children, lead = false }) => (
      <div className={`tracker-copy ${lead ? 'tracker-lead vt-lead' : 'tracker-body vt-body'}`}>
        {children}
      </div>
    );

    const Screenshot = ({ src, alt, tag }) => (
      <a className="tracker-visual" href={src} target="_blank" rel="noopener noreferrer" aria-label={`${alt} full-size image`}>
        <span className="tracker-tag">{tag}</span>
        <img className="tracker-shot" src={src} alt={alt} />
      </a>
    );

    const Hero = () => (
      <section className="tracker-hero">
        <div className="tracker-wrap">
          <Eyebrow color="#00E26A">For Shopify store owners who want to convert more of the traffic they already pay for</Eyebrow>
          <h1 className="vt-display">
            Right now, shoppers are leaving your store in under 30 seconds.<br />
            <span style={{ color: '#fff' }}>You can't see which pages, or how fast — yet.</span>
          </h1>
          <Copy lead>
            <p>You can feel the money leaking. You just can't see where — which page, how fast, how bad.</p>
          </Copy>
          <CTA />
        </div>
      </section>
    );

    const Airfield = () => (
      <Section id="merchants" className="tracker-airfield">
        <p className="tracker-section-intro">Do you even know your bounce rate? Not a guess — the real number, page by page. Most owners I ask say something like "I think it's about 50, 60%?" and then shrug. That shrug is the problem. It's not that the bounce is high — it's that you've made peace with a number you can't actually see. Maybe a page you think is fine is quietly losing 6 in 10 shoppers before they see a thing — and you'd never know. That's where you're bleeding the money. In the dark, every single day.</p>
        <h2 className="tracker-heading vt-h2">Think of your store as an airfield</h2>
        <Copy>
          <p>Every shopper your ads bring in is a plane coming down to land. Wheels touch the ground, and in those few seconds they're looking out the window — is there anything here worth getting off for?</p>
          <p>See something good, they stop. People get out, walk into the building, buy. See nothing, the stick goes back and they're gone — back up into the sky before they ever really landed.</p>
        </Copy>
        <Copy>
          <p>And that window is short. About 30 seconds — that's all the time most shoppers give you. In that half-minute they're looking for something worth getting off the plane for. Plenty don't find it, the stick goes back, and up they go — and you paid to bring every one of them down.</p>
          <p>So here's the only question that matters right now: what's your number? How many planes touched down on your field today and lifted off again? Not a guess. Not "probably around half." The exact number, page by page. You've never had it. For the first time, you could. That's where we start — not with a fix, with your number.</p>
        </Copy>
        <div className="tracker-break" aria-hidden="true" />
        <Copy>
          <p>Here's what you already know in your gut: the fix isn't more traffic. You can double your ad spend and watch the same thing happen — more visitors, the same share buying, the rest gone in seconds. The number you actually want to move is conversion. And you can't move it until you can see where, exactly, you're losing people.</p>
        </Copy>
      </Section>
    );

    const AnalyticsGap = () => (
      <Section>
        <h2 className="tracker-heading vt-h2">You've got analytics. So why is this still so hard to see?</h2>
        <Copy>
          <p>You're not flying without instruments. Open the Analytics tab in your Shopify admin and there's plenty there — sessions, sales, your conversion rate, the little map lighting up with dots. All of it real. None of it answers the question you just asked.</p>
          <p>Shopify tells you 662 shoppers landed and 4 of them bought. It hands you the result — the final tally. What it doesn't do is show you the moment in between, when most of them slipped away.</p>
        </Copy>
        <div className="tracker-break" aria-hidden="true" />
        <Copy>
          <p>That moment is the one thing we show you. Vrrrt watches your whole airfield — every page, wherever a shopper lands — and puts a real number on each one. How many came down. How many lifted off, and how fast. And here's what tends to catch people: it's not always the page you'd expect. That landing page you built for the campaign, the collection you were sure was your strongest — sometimes that's the one quietly losing the most. You open it up and you just see it: which pages are performing, which aren't, page by page, in plain numbers.</p>
        </Copy>
      </Section>
    );

    const Leaderboard = () => (
      <Section>
        <h2 className="tracker-heading vt-h2">This is what's happening on your airfield</h2>
        <Copy>
          <p>Install the app, okay the tracking, that's it. Start watching straight away. As the shoppers land you will see immediate results — the full picture of your store. Every page that gets visited will show up here, and you'll find out how that page performs.</p>
        </Copy>
        <div className="tracker-card">
          <Screenshot
            src="assets/PLACEHOLDER-tracker-leaderboard.png"
            alt="Store discovery leaderboard showing pages with shoppers landed, average time, and red percentage gone in the first 30 seconds"
            tag="Example — modeled on Shopify benchmarks"
          />
          <p className="tracker-caption vt-small">Pages ranked from highest bounce to lowest. How many shoppers visited each, how long they stayed, and how many left within the first 30 seconds — the red number. Some pages hold people. Some don't. Now you can see which is which.</p>
        </div>
        <p className="tracker-pull vt-h3">662 shoppers landed on this homepage. 299 were gone inside 30 seconds. That was traffic you paid to bring in — and nearly half of it was spent before it ever got going.</p>
        <p className="tracker-honesty vt-small">Straight with you: the numbers on this screen aren't a real customer's store. They're modeled on Shopify's published benchmarks — we're showing you what the dashboard looks like, not making a promise about your store. Yours might be better. It might be worse. The point is you stop guessing and finally see your own.</p>
      </Section>
    );

    const DropOffCurve = () => (
      <Section>
        <h2 className="tracker-heading vt-h2">Now point it at one page and watch up close</h2>
        <Copy>
          <p>The leaderboard watches your whole store at once. But when a page needs a proper look, you point Vrrrt straight at it — pick the page or collection, hit Track this page or collection, and now you're watching that one on its own. Where shoppers look, what they click, what they buy, and where they leave.</p>
        </Copy>
        <div className="tracker-card">
          <Screenshot
            src="assets/PLACEHOLDER-page-drilldown.png"
            alt="Page drilldown showing the drop-off curve alongside before-cube bounce rates and journey-to-sale stats"
            tag="Example — modeled on Shopify benchmarks"
          />
          <p className="tracker-caption vt-small">662 landed on this page. Watch the line fall — 66 gone by 10 seconds, 299 by 30, and on it goes.</p>
        </div>
        <Copy>
          <p>Research suggests there are really only two reasons a shopper lands and leaves this fast. One: the page was too slow, and they bail. Two: it loaded fine, they looked, and nothing they saw held them.</p>
          <p>Until now you couldn't tell which. The curve finally shows you.</p>
        </Copy>
      </Section>
    );

    const EcommerceBenchmarks = () => (
      <Section>
        <h2 className="tracker-heading vt-h2">Before you think this is just your store — it isn't</h2>
