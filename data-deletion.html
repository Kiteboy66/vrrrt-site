    window.__DOC = {

      intro: 'This page explains how merchants, partners, and shoppers can request deletion of data associated with Vrrrt.',
      sections: [
        { h: '1. Merchant app data',
          body: [
            'When a merchant uninstalls the Vrrrt Shopify app, Shopify sends us an app/uninstalled webhook. We use that webhook to remove Shopify app sessions associated with the store.',
            'Merchants can also request deletion of remaining account, catalog, support, and operational records by emailing support@vrrrt.com from an email address associated with the store.'
          ]
        },
        { h: '2. Partner account data',
          body: [
            'Partners can request deletion of their partner profile, referral records, payout request history, and session records by emailing support@vrrrt.com.',

          ]
        },
        { h: '3. Shopper data',
          body: [
            'Vrrrt Cube is designed not to collect shopper names, email addresses, payment details, or account credentials from storefront visitors.',

            'If a shopper believes Vrrrt has processed personal data connected to them, they can contact support@vrrrt.com with the store URL, approximate visit time, and relevant details so we can investigate.'
          ]
        },
        { h: '4. Verification',
          body: [
            'Before deleting merchant or partner records, we may need to verify that the requester controls the relevant store, account, or email address.',

          ]
        },
        { h: '5. Timing',
          body: [
            'We aim to complete verified deletion requests within 30 days, unless a longer period is required by law or needed for security, billing, or dispute-resolution purposes.',
            'Backup copies may persist for a limited period until normal backup rotation completes.'
          ]
        },
        { h: '6. Contact',
          body: [
            'Send deletion requests to support@vrrrt.com with the subject line "Data deletion request". Include your store URL or account email so we can locate the correct records.'
