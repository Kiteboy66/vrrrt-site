  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: 'Geist', system-ui, sans-serif; background: #FAFAFA; color: #0A0A0B; -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; }
    button, a { font-family: inherit; }
    .vt-btn { white-space: nowrap; }
    .vt-btn--primary:hover { background: #3CFA8B !important; box-shadow: 0 0 0 4px rgba(0,226,106,0.18), 0 0 24px rgba(0,226,106,0.45); }
    .vt-btn--ghost:hover { background: #F4F4F5 !important; }
    .vt-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="root" data-screen-label="Privacy"></div>
  <script>
    window.__DOC = {
      id: 'privacy',
      kind: 'Privacy policy',
      title: 'Privacy policy.',
      lastUpdated: 'May 30, 2026',
      intro: 'Vrrrt Cube indexes merchant catalogs, serves the Cube to shoppers, and reports non-identifying engagement analytics to merchants. This policy explains what we collect, how we use it, and the controls you have.',
      sections: [
        { h: '1. What we collect',
          body: [
            'For merchants: store URL, public catalog data (products, variants, images, prices, stock status), Cube configuration, aggregate engagement metrics, and the account information you provide at sign-up.',
            'For storefront visitors: Vrrrt Cube may collect non-identifying interaction events such as Cube load/session events, active time spent with the Cube while it is visible, retention milestones such as 10s, 30s, 60s, 2m38s, and 3m+, Cube navigation interactions, search terms submitted inside the Cube, number of search results returned, product tile clicks, quick-view opens, and View product clicks from the Cube.',
            'For reporting context: Vrrrt Cube may process product and image metadata needed to show merchant analytics, such as product title, product ID, image URL, collection title, Cube key, and shop domain.',
            'We do not need to identify individual shoppers to provide these analytics. We do not collect shopper names, email addresses, payment information, or account credentials from storefront visitors using a Vrrrt-equipped merchant.'
          ]
        },
        { h: '2. How we use it',
          body: [
            'To operate Vrrrt Cube: showing shoppers more products in real time.',
            'To provide merchant analytics: helping merchants understand whether shoppers load the Cube, stay engaged with it, search inside it, open product details, and click through to product pages.',
            'To improve the product: aggregate metrics inform ranking, search quality, latency, reliability, and feature work.',
            'To bill merchants: usage counters drive plan tiers and overages, where applicable.'
          ]
        },
        { h: '3. What we do not do',
          body: [
            'We do not sell shopper data. To anyone, ever.',
            'We do not run cross-merchant retargeting. A shopper\'s browse history on one store stays on one store.',
            'We do not claim to track checkout conversion unless a separate conversion feature is implemented and disclosed.',
            'We do not train large models on your catalog without an explicit per-merchant opt-in.'
          ]
        },
        { h: '4. Cookies & tracking',
          body: [
            'Vrrrt sets a first-party session cookie (vrrrt_sid) to maintain a 3-minute browse session. It expires when the session ends or after 24 hours of inactivity, whichever comes first.',
            'We use no third-party advertising cookies. We use first-party analytics (PostHog, self-hosted) and operational logging (Sentry).'
          ]
        },
        { h: '5. Data residency & retention',
          body: [
            'Default region is US-East (AWS). EU and APAC residency options are available on Pro and enterprise plans.',
            'Session-level interaction events are retained for 90 days. Aggregate merchant analytics are retained for the life of the account unless deleted earlier by request or account closure.'
          ]
        },
        { h: '6. Your rights',
          body: [
            'Merchants: export, delete, or transfer your data via the Vrrrt dashboard or by emailing privacy@vrrrt.com.',
            'Shoppers: clearing your browser cookies removes Vrrrt\'s session ID. Because Vrrrt Cube analytics are designed not to identify individual shoppers, we may not be able to locate a specific visitor session without details such as the store URL, approximate visit time, and browser/device context.'
          ]
        },
        { h: '7. Contact',
          body: ['Questions? privacy@vrrrt.com. DPO inquiries: dpo@vrrrt.com. Mailing address available on request.']
        },
      ],
    };
  </script>
