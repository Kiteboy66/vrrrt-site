<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partner pack — Vrrrt</title>
  <meta name="description" content="Vrrrt partner positioning, install checklist, and client handoff notes." />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/styles.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #FAFAFA; }
    body { font-family: 'Geist', system-ui, sans-serif; color: #0A0A0B; -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; }
    button, a { font-family: inherit; }
    .vt-btn { white-space: nowrap; }
    .vt-btn--primary:hover { background: #3CFA8B !important; box-shadow: 0 0 0 4px rgba(0,226,106,0.18), 0 0 24px rgba(0,226,106,0.45); }
    .vt-btn--ghost:hover { background: #F4F4F5 !important; }
    .vt-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="root" data-screen-label="Partner pack"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="/shared.jsx"></script>

  <script type="text/babel">
    const Pack = () => (
      <>
        <Header active="partners" />
        <section style={{ background: '#0A0A0B', color: '#fff', padding: '88px 32px 64px' }}>
          <div style={{ maxWidth: 920, margin: '0 auto' }}>
            <Eyebrow color="#00E26A">— Partner pack</Eyebrow>
            <h1 style={{ fontSize: 64, letterSpacing: '-0.05em', lineHeight: 1, margin: 0 }}>Sell Vrrrt cleanly.</h1>
            <p style={{ color: '#A1A1AA', fontSize: 17, lineHeight: 1.6, maxWidth: '58ch', marginTop: 20 }}>
              Use this as your client checklist when adding Vrrrt to a Shopify build.
            </p>
          </div>
        </section>
        <section style={{ background: '#FAFAFA', padding: '64px 32px 96px' }}>
          <div style={{ maxWidth: 920, margin: '0 auto', display: 'grid', gap: 16 }}>
            {[
              ['Positioning', 'Vrrrt is an interactive collection discovery block that helps shoppers browse visually before opening product pages.'],
              ['Install checklist', 'Install the app, add the theme block, choose collections, review Cube navigation, check mobile, then test quick view and product links.'],
              ['Client handoff', 'Show the merchant how to change collections, navigation text styling, label colors, and quick-view behavior from the theme editor.'],
              ['Partner tracking', 'Use your referral code during setup so commissions can be tracked in your partner dashboard.'],
            ].map(([h, p]) => (
              <article key={h} style={{ background: '#fff', borderRadius: 14, padding: '28px 32px', boxShadow: '0 0 0 1px rgba(0,0,0,0.05)' }}>
                <h2 style={{ margin: 0, fontSize: 24, letterSpacing: '-0.02em' }}>{h}</h2>
                <p style={{ color: '#3F3F46', lineHeight: 1.6, margin: '10px 0 0' }}>{p}</p>
              </article>
            ))}
            <div style={{ marginTop: 18, display: 'flex', gap: 12, flexWrap: 'wrap' }}>
              <Button variant="primary" size="lg" href="https://3dnavigate.vrrrt.app/partners/register" target="_blank" rel="noopener noreferrer">Create partner account</Button>
              <Button variant="tertiary" size="lg" href="/partners">Partner program</Button>
            </div>
          </div>
        </section>
        <Footer />
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<Pack />);
  </script>
</body>
</html>
